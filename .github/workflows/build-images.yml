name: build-images

on:
  push:
    branches: [main]
    tags: ["v*"]
    # Whitelist: nur Files, die wirklich ins Image gehen oder Tests beeinflussen,
    # triggern den Workflow. Alles andere (setup.sh, docker-compose*.yml,
    # README.md, SPEC.md, examples/, LICENSE …) löst KEINEN Build aus.
    paths:
      - "Dockerfile"
      - "main.py"
      - "models.py"
      - "requirements.txt"
      - "migrations/**"
      - "scripts/**"
      - "mcp-server/**"
      - "tests/**"
      - ".github/workflows/build-images.yml"
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - "main.py"
      - "models.py"
      - "requirements.txt"
      - "migrations/**"
      - "scripts/**"
      - "mcp-server/**"
      - "tests/**"
      - ".github/workflows/build-images.yml"

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        # Eine einzige pip-Invocation, sodass der Resolver die Schnittmenge
        # aller drei Requirement-Files findet. Sequenzielle Installs upgraden
        # sonst transitive Deps (z.B. starlette → 1.0 wegen sse-starlette),
        # was fastapi 0.115's interne `Router(on_startup=…)` Nutzung bricht.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r mcp-server/requirements.txt -r tests/requirements.txt

      - name: Run pytest
        run: python -m pytest tests/ -v

  build:
    name: build-and-push (${{ matrix.image.name }})
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: hermes-playbook-registry
            context: .
            dockerfile: Dockerfile
          - name: hermes-playbook-registry-mcp
            context: ./mcp-server
            dockerfile: Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${REPO_OWNER}/${{ matrix.image.name }}"
          TAGS="${IMAGE}:${{ github.sha }}"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="${TAGS},${IMAGE}:${VERSION}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.context }}/${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
