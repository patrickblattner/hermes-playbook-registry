# Production-Compose: zieht pre-built Images aus GHCR.
# Für Entwickler-Build aus dem Source-Tree: zusätzlich docker-compose.dev.yml laden.
#
#   docker compose pull && docker compose up -d                    # Production
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build  # Dev
#
# Image-Tag wird über REGISTRY_TAG gesteuert (default 'latest').

services:
  playbook-registry:
    image: ghcr.io/patrickblattner/hermes-playbook-registry:${REGISTRY_TAG:-latest}
    container_name: playbook-registry
    restart: unless-stopped
    volumes:
      - playbook-data:/data
    networks:
      - hermes-net
    # Standardmäßig kein Port-Mapping nach außen — der Service ist nur
    # innerhalb des hermes-net erreichbar (sicherer).
    # Zum Debuggen vom Host aus: untenstehende Zeile auskommentieren.
    # ports:
    #   - "127.0.0.1:8080:8000"

  # ---- MCP-Wrapper (Phase 7) ----
  # Dünner Adapter: macht die REST-Registry über MCP-Tools für agent-native
  # Konsumenten verfügbar. Pro Agent ein Wrapper-Container, damit AGENT_ID
  # serverseitig fest ist und der Client die Identität nicht fälschen kann.
  # Alternative: STDIO-Modus (MCP_TRANSPORT=stdio), siehe README.

  playbook-registry-mcp-hermes:
    image: ghcr.io/patrickblattner/hermes-playbook-registry-mcp:${REGISTRY_TAG:-latest}
    container_name: playbook-registry-mcp-hermes
    restart: unless-stopped
    depends_on:
      - playbook-registry
    networks:
      - hermes-net
    environment:
      - PLAYBOOK_REGISTRY_URL=http://playbook-registry:8000
      - AGENT_ID=hermes
      - MCP_TRANSPORT=http
      - MCP_PORT=8001
    # ports:
    #   - "127.0.0.1:8001:8001"

  playbook-registry-mcp-hermine:
    image: ghcr.io/patrickblattner/hermes-playbook-registry-mcp:${REGISTRY_TAG:-latest}
    container_name: playbook-registry-mcp-hermine
    restart: unless-stopped
    depends_on:
      - playbook-registry
    networks:
      - hermes-net
    environment:
      - PLAYBOOK_REGISTRY_URL=http://playbook-registry:8000
      - AGENT_ID=hermine
      - MCP_TRANSPORT=http
      - MCP_PORT=8001

  # ---- Platzhalter für deine Agenten ----
  # Anpassen an dein tatsächliches Hermes-Setup. Wichtig sind nur:
  #   - im selben Network (hermes-net)
  #   - PLAYBOOK_REGISTRY_URL (REST direkt) ODER
  #   - MCP-Server als Tool registriert (siehe oben)

  # hermes-agent-1:
  #   image: dein-hermes-image:latest
  #   container_name: hermes-agent-1
  #   restart: unless-stopped
  #   networks:
  #     - hermes-net
  #   environment:
  #     - PLAYBOOK_REGISTRY_URL=http://playbook-registry:8000
  #     - AGENT_ID=agent-1
  #   volumes:
  #     - hermes-agent-1-data:/root/.hermes

  # hermes-agent-2:
  #   image: dein-hermes-image:latest
  #   container_name: hermes-agent-2
  #   restart: unless-stopped
  #   networks:
  #     - hermes-net
  #   environment:
  #     - PLAYBOOK_REGISTRY_URL=http://playbook-registry:8000
  #     - AGENT_ID=agent-2
  #   volumes:
  #     - hermes-agent-2-data:/root/.hermes

volumes:
  playbook-data:
    driver: local
  # hermes-agent-1-data:
  # hermes-agent-2-data:

networks:
  # Shared bridge network. external: true — wird einmal pro Host vom setup.sh
  # angelegt (oder manuell via `docker network create hermes-net`) und kann
  # von externen Stacks (Hermes-Agent-Container etc.) per `external: true`
  # mitbenutzt werden. Dadurch erreichen die Agenten REST + MCP-Wrapper über
  # die Service-Namen ohne Port-Mapping nach außen.
  hermes-net:
    external: true
    name: hermes-net
