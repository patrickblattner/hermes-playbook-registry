# Beispiel-Compose für einen externen Hermes-Agent-Stack.
#
# Dieser Stack läuft auf demselben Docker-Host wie die Registry, aber als
# eigene Compose-Konfiguration. Verbindung über das gemeinsame Bridge-
# Network 'hermes-net' (vom Registry-Stack via setup.sh angelegt).
# Kein Port-Mapping nach außen — Agent erreicht Registry und MCP nur intern.
#
# Voraussetzung: 'hermes-net' existiert auf dem Host. Wird vom setup.sh des
# Registry-Stacks erstellt; manuell ginge auch:  docker network create hermes-net
#
# Verwendung:
#   docker compose -f hermes-agent-stack.yml up -d
#
# Anpassen:
#   - 'image:' auf dein tatsächliches Hermes-Image
#   - AGENT_ID setzt die Identität, die im Registry-Audit-Log erscheint
#     (author_agent / validator_agent). Pro Agent eindeutig wählen.

services:
  hermes-agent-1:
    image: dein-hermes-image:latest    # ANPASSEN
    container_name: hermes-agent-1
    restart: unless-stopped
    networks:
      - hermes-net
    environment:
      - AGENT_ID=hermes
      # Variante A — Direkt REST (Agent setzt author_agent / validator_agent
      # selbst im Body):
      - PLAYBOOK_REGISTRY_URL=http://playbook-registry:8000
      # Variante B — Via MCP-Wrapper. Ein gemeinsamer Wrapper-Container für
      # alle Agenten; Agent schickt seine Identität pro Tool-Call mit
      # (`as_agent`-Parameter). Empfohlen für agent-native Tool-Discovery.
      - MCP_REGISTRY_URL=http://playbook-registry-mcp:8001/mcp

  hermes-agent-2:
    image: dein-hermes-image:latest    # ANPASSEN
    container_name: hermes-agent-2
    restart: unless-stopped
    networks:
      - hermes-net
    environment:
      - AGENT_ID=hermine
      - PLAYBOOK_REGISTRY_URL=http://playbook-registry:8000
      - MCP_REGISTRY_URL=http://playbook-registry-mcp:8001/mcp

networks:
  hermes-net:
    external: true
    name: hermes-net
